<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile | MovieMind</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* ডিলিট বাটনের জন্য ছোট কিছু স্টাইল */
        .remove-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(255, 71, 87, 0.8);
            color: white;
            border: none;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            transition: 0.3s;
            z-index: 5;
            opacity: 0; /* মাউস না নিলে দেখা যাবে না */
        }

        .movie-card:hover .remove-btn {
            opacity: 1; /* মাউস নিলে ভেসে উঠবে */
            transform: scale(1.1);
        }

        .remove-btn:hover {
            background: #ff4757;
        }
        
        .movie-card {
            position: relative; /* বাটন পজিশন করার জন্য জরুরি */
        }
    </style>
</head>
<body class="profile-page">
    <nav class="glass">
        <a href="/" class="btn-text"><i class="fas fa-chevron-left"></i> Back to Dashboard</a>
        <div class="nav-right">
            <a href="/logout" class="logout-link" title="Sign Out">
                <i class="fas fa-sign-out-alt"></i>
            </a>
        </div>
    </nav>

    <div class="container profile-layout">
        <aside class="profile-card">
            <div class="profile-avatar-large">{{ session['username'][0].upper() }}</div>
            <h2>{{ session['username'] }}</h2>
            <p class="user-tag">Movie Enthusiast</p>
            
            <button class="edit-toggle-btn" onclick="toggleEdit()">
                <i class="fas fa-user-edit"></i> Edit Profile
            </button>

            <div id="editForm" class="hidden-form" style="display: none;">
                <form method="POST">
                    <div class="glass-input-group">
                        <label>New Username</label>
                        <input type="text" name="username" value="{{ session['username'] }}" class="glass-input" required>
                    </div>
                    <div class="glass-input-group">
                        <label>New Password</label>
                        <input type="password" name="password" placeholder="••••••••" class="glass-input" required>
                    </div>
                    <button type="submit" class="btn-primary" style="width: 100%;">Save Changes</button>
                </form>
            </div>

            <hr class="divider">
            <button onclick="deleteAccount()" class="btn-text danger">
                <i class="fas fa-user-slash"></i> Delete Account
            </button>
        </aside>

        <main class="profile-main">
            <section class="movie-section">
                <h2><i class="fas fa-bookmark" style="color: #6a11cb;"></i> My Watchlist</h2>
                <div class="movie-grid">
                    {% for title, poster in watchlist %}
                    <div class="movie-card glass">
                        <button class="remove-btn" onclick="removeFromList('{{ title }}', 'watchlist')" title="Remove from Watchlist">
                            <i class="fas fa-trash"></i>
                        </button>
                        <img src="{{ poster }}" alt="{{ title }}" loading="lazy">
                        <p class="movie-title">{{ title }}</p>
                    </div>
                    {% endfor %}
                </div>
            </section>

            <section class="movie-section">
                <h2><i class="fas fa-heart" style="color: #ff4757;"></i> Liked Movies</h2>
                <div class="movie-grid">
                    {% for title, poster in liked %}
                    <div class="movie-card glass">
                        <button class="remove-btn" onclick="removeFromList('{{ title }}', 'liked')" title="Unlike Movie">
                            <i class="fas fa-trash"></i>
                        </button>
                        <img src="{{ poster }}" alt="{{ title }}" loading="lazy">
                        <p class="movie-title">{{ title }}</p>
                    </div>
                    {% endfor %}
                </div>
            </section>
        </main>
    </div>

    <script>
        function toggleEdit() {
            const form = document.getElementById('editForm');
            form.style.display = (form.style.display === 'block') ? 'none' : 'block';
        }

        // রিমুভ করার ফাংশন (যদি script.js এ না থাকে তবে এখানে থাকল)
        function removeFromList(movieTitle, actionType) {
            if (confirm(`Remove "${movieTitle}" from your ${actionType} list?`)) {
                fetch('/interact', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        movie: movieTitle, 
                        action: actionType 
                    })
                })
                .then(response => response.json())
                .then(data => {
                    if (data.status === 'success') {
                        location.reload(); // পেজ রিফ্রেশ করে লিস্ট আপডেট করবে
                    }
                })
                .catch(error => console.error('Error:', error));
            }
        }
    </script>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
