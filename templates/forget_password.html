<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Forget Password | MovieMind</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div style="display: flex; justify-content: center; align-items: center; min-height: 100vh;">
        <div class="glass" style="padding: 40px; width: 350px; text-align: center;">
            <h2 style="margin-bottom: 20px;">Reset Password</h2>
            <form action="/forget_password" method="POST">
                <div style="margin-bottom: 15px;">
                    <input type="text" name="username" placeholder="Enter Username" required 
                           style="width: 100%; padding: 12px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.1); color: white;">
                </div>
                <div style="margin-bottom: 20px;">
                    <input type="password" name="password" placeholder="New Password" required 
                           style="width: 100%; padding: 12px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.1); color: white;">
                </div>
                <button type="submit" class="btn-primary" style="width: 100%; padding: 12px; border-radius: 25px;">Update Password</button>
            </form>
            <p style="margin-top: 20px; font-size: 0.9rem;">
                Back to <a href="/login" style="color: #a29bfe; text-decoration: none;">Login</a>
            </p>
        </div>
    </div>
</body>
</html>
